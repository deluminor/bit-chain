<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Top link gradient: light → brand blue -->
    <linearGradient id="g1" x1="194" y1="225" x2="830" y2="575" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#bfdbfe"/>
      <stop offset="55%"  stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>

    <!-- Bottom link gradient: brand blue → deep navy -->
    <linearGradient id="g2" x1="194" y1="449" x2="830" y2="799" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#60a5fa"/>
      <stop offset="55%"  stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>

    <!-- Ambient center glow -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="45%">
      <stop offset="0%"   stop-color="#1e40af" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>

    <!-- Link glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip: left half of canvas (x < 512) -->
    <clipPath id="left">
      <rect x="0"   y="0" width="512" height="1024"/>
    </clipPath>
    <!-- Clip: right half of canvas (x ≥ 512) -->
    <clipPath id="right">
      <rect x="512" y="0" width="512" height="1024"/>
    </clipPath>
  </defs>

  <!-- ── Background ─────────────────────────── -->
  <rect width="1024" height="1024" fill="#0f172a"/>
  <rect width="1024" height="1024" fill="url(#bgGlow)"/>

  <!--
    INTERLOCKING CHAIN LINKS
    Drawing order achieves real interlock:
      [1] top link LEFT half  → behind bottom link on left
      [2] bottom link FULL    → in front on left, behind on right
      [3] top link RIGHT half → in front of bottom link on right
  -->

  <!-- [1] Top link — left half (rendered behind bottom link) -->
  <ellipse
    cx="512" cy="400" rx="310" ry="110"
    transform="rotate(28, 512, 400)"
    fill="none"
    stroke="url(#g1)"
    stroke-width="76"
    clip-path="url(#left)"
    filter="url(#glow)"
  />

  <!-- [2] Bottom link — full stroke -->
  <ellipse
    cx="512" cy="624" rx="310" ry="110"
    transform="rotate(-28, 512, 624)"
    fill="none"
    stroke="url(#g2)"
    stroke-width="76"
    filter="url(#glow)"
  />

  <!-- [3] Top link — right half (rendered in front of bottom link) -->
  <ellipse
    cx="512" cy="400" rx="310" ry="110"
    transform="rotate(28, 512, 400)"
    fill="none"
    stroke="url(#g1)"
    stroke-width="76"
    clip-path="url(#right)"
    filter="url(#glow)"
  />
</svg>
